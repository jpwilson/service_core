name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @servicecore/web lint

      - name: Typecheck
        run: pnpm --filter @servicecore/web typecheck

      - name: Run tests
        run: pnpm turbo test:run

      - name: Build
        run: pnpm turbo build

      - name: Verify build output exists
        run: |
          if [ ! -d "apps/web/dist" ]; then
            echo "ERROR: Build output directory apps/web/dist does not exist"
            exit 1
          fi
          if [ ! -f "apps/web/dist/index.html" ]; then
            echo "ERROR: Build output apps/web/dist/index.html does not exist"
            exit 1
          fi
          echo "Build output verified successfully"
          ls -la apps/web/dist/

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 7

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high || true
